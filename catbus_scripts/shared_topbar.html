<header class="catbus-topbar">

<style>

    border-bottom: 2px solid var(--accent-color);

    align-items: center;
    gap: 12px;
    min-width: 0;
    justify-self: start;
  }
  .catbus-topbar-logo {
    width: 108px;
    height: auto;
    object-fit: contain;
    display: block;
    flex-shrink: 0;
  }
  .catbus-topbar-titles {
    display: flex;
    flex-direction: column;
  }
  .catbus-topbar-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent-color);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .catbus-topbar-subtitle {
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.3px;
  }
  .catbus-topbar-app-title {

    font-weight: 700;

      row-gap: 8px;

      grid-area: brand;
