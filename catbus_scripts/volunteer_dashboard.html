<body class="light">
  <header>
    <h1>👤 Volunteer Dashboard</h1>
    <div>
      <button aria-label="Toggle dark mode" class="toggle-theme" onclick="toggleTheme()">☀️</button>
    </div>
  </header>

  <div class="form-section">
    <h2>My Schedule</h2>
    <div class="form-group">
      <label for="searchName">Search for your name:</label>
      <div class="autocomplete-container">
        <input type="text" id="searchName" placeholder="Start typing to search for a volunteer..." autocomplete="off" style="flex: 1;" role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="autocompleteDropdown">
        <div id="autocompleteDropdown" class="autocomplete-dropdown" role="listbox"></div>
      </div>
      <div class="search-buttons">
        <button type="button" onclick="searchByName()">🔍 Search</button>
        <button type="button" onclick="clearSearch()" style="background-color: #666;">✖️ Clear</button>
      </div>
    </div>

    <div id="nameResults" class="results-section" style="display: none;">
      <h3 id="nameResultsHeader">Your Assigned Shifts</h3>
      <div id="nameResultsContent"></div>

      <!-- Stats section — shown after a successful name search -->
      <div id="statsSection" style="margin-top: 20px; display: none;">
        <div class="stats-card">
          <h3>📊 Personal Stats</h3>
          <div class="stats-day-filter">
            <label for="statsDay">Filter by day:</label>
            <select id="statsDay" onchange="refreshStats()">
              <option value="">All Time</option>
            </select>
          </div>
          <div id="statsContent"><div class="loading"></div></div>
        </div>
      </div>
    </div>
  </div>

<?!= include('shared_scripts') ?>
<script>
  // Schedule configuration - loaded from backend Config.gs
  const SHIFT_CONFIG = {
    TIME_SLOTS: {}
  };

  let allVolunteerNames = [];
  let currentVolunteerName = '';

  window.addEventListener('load', () => {
    loadVolunteerNames();
    loadScheduleConfig();
    setupAutocomplete();
  });

  function loadScheduleConfig() {
    google.script.run
      .withSuccessHandler(config => {
        SHIFT_CONFIG.TIME_SLOTS = config.timeSlots;

        // Populate stats day dropdown from day labels
        const statsDay = document.getElementById('statsDay');
        const dayLabels = config.dayLabels;
        for (let i = 0; i < dayLabels.length; i++) {
          const opt = document.createElement('option');
          opt.value = dayLabels[i];
          opt.textContent = dayLabels[i];
          statsDay.appendChild(opt);
        }
      })
      .withFailureHandler(error => {
        console.error('Error loading schedule config:', error);
      })
      .getScheduleConfig();
  }

  function loadVolunteerNames() {
    google.script.run
      .withSuccessHandler(names => {
        allVolunteerNames = names || [];
      })
      .withFailureHandler(error => {
        console.error('Error loading volunteer names:', error);
        allVolunteerNames = [];
      })
      .getAllVolunteerNames();
  }

  let vsAutocomplete;

  function setupAutocomplete() {
    vsAutocomplete = createAutocomplete({
      inputId: 'searchName',
      dropdownId: 'autocompleteDropdown',
      idPrefix: 'vs-option-',
      getItems: () => allVolunteerNames,
      filterItem: (name, term) => name.toLowerCase().includes(term),
      renderItem: (name, i, term) => autocompleteHighlightMatch(name, term),
      onSelect: () => searchByName(),
      onEnterFallback: () => searchByName()
    });
  }

  function selectVolunteer(name) {
    document.getElementById('searchName').value = name;
    searchByName(name);
  }

  function clearSearch() {
    const searchInput = document.getElementById('searchName');
    searchInput.value = '';
    if (vsAutocomplete) vsAutocomplete.clear();
    document.getElementById('nameResults').style.display = 'none';
    document.getElementById('statsSection').style.display = 'none';
    currentVolunteerName = '';
  }

  function searchByName() {
    const searchTerm = document.getElementById('searchName').value.trim().toLowerCase();

    if (!searchTerm) {
      alert('Please enter a name to search');
      return;
    }

    const nameResults = document.getElementById('nameResults');
    const nameResultsContent = document.getElementById('nameResultsContent');
    nameResults.style.display = 'block';
    nameResultsContent.innerHTML = '<div class="loading"></div> Loading...';
    document.getElementById('statsSection').style.display = 'none';

    google.script.run
      .withSuccessHandler(result => {
        displayNameResults(result, searchTerm);
      })
      .withFailureHandler(error => {
        nameResultsContent.innerHTML = `<div class="no-results">Error loading schedule: ${error.message || error}</div>`;
      })
      .getVolunteerScheduleByName(searchTerm);
  }

  function displayNameResults(result, searchTerm) {
    const nameResultsContent = document.getElementById('nameResultsContent');
    const nameResultsHeader = document.getElementById('nameResultsHeader');

    if (!result || !result.shifts || result.shifts.length === 0) {
      nameResultsHeader.textContent = 'Search Results';
      nameResultsContent.innerHTML = `<div class="no-results">No scheduled shifts found for "${searchTerm}"</div>`;
      return;
    }

    currentVolunteerName = result.volunteerName || searchTerm;

    const tagHtml = result.volunteerTag
      ? `<span class="volunteer-tag">${escapeHtml(result.volunteerTag)}</span>`
      : '';
    nameResultsHeader.innerHTML = `Assigned Shifts for: ${escapeHtml(result.volunteerName || searchTerm)} ${tagHtml}`;

    let html = `
      <table class="schedule-table">
        <thead>
          <tr>
            <th>Day</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
    `;

    result.shifts.forEach(shift => {
      html += `
        <tr>
          <td>${shift.day}</td>
          <td>${shift.time}</td>
        </tr>
      `;
    });

    html += `
        </tbody>
      </table>
      <div class="total-shifts">📅 Total Shifts: ${result.shifts.length}</div>
    `;

    nameResultsContent.innerHTML = html;

    // Show stats section and load initial stats (all-time)
    document.getElementById('statsSection').style.display = 'block';
    document.getElementById('statsDay').value = '';
    refreshStats();
  }

  function refreshStats() {
    if (!currentVolunteerName) return;

    const filterDateStr = document.getElementById('statsDay').value || '';
    const statsContent = document.getElementById('statsContent');
    statsContent.innerHTML = '<div class="loading"></div>';

    google.script.run
      .withSuccessHandler(stats => {
        renderStats(stats, filterDateStr);
      })
      .withFailureHandler(error => {
        statsContent.innerHTML = `<span style="color:#999; font-size:0.9em;">Could not load stats.</span>`;
        console.error('Stats error:', error);
      })
      .getVolunteerPersonalStats(currentVolunteerName, filterDateStr || null);
  }

  function formatMinutes(mins) {
    if (mins === null || mins === undefined) return '—';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return h > 0 ? `${h} hr ${m} min` : `${m} min`;
  }

  function renderStats(stats, filterDateStr) {
    const statsContent = document.getElementById('statsContent');

    // --- Personal stats ---
    let filedLabel, filedValue, reviewedValue;
    if (filterDateStr) {
      const dayFiled = stats.returnsFiltered !== null ? stats.returnsFiltered : 0;
      const dayReviewed = stats.reviewedFiltered !== null ? stats.reviewedFiltered : 0;
      filedLabel = escapeHtml(filterDateStr);
      filedValue = `<strong>${dayFiled}</strong> <span class="stat-alltime">(${stats.returnsAllTime} all‑time)</span>`;
      reviewedValue = `<strong>${dayReviewed}</strong> <span class="stat-alltime">(${stats.reviewedAllTime} all‑time)</span>`;
    } else {
      filedLabel = 'All time';
      filedValue = `<strong>${stats.returnsAllTime}</strong>`;
      reviewedValue = `<strong>${stats.reviewedAllTime}</strong>`;
    }

    const totalMin = Math.round(stats.totalVolunteerMinutes || 0);
    const days = Math.floor(totalMin / (60 * 24));
    const hours = Math.floor((totalMin % (60 * 24)) / 60);
    const mins = totalMin % 60;
    let timeStr;
    if (days > 0) {
      timeStr = `${days} day${days > 1 ? 's' : ''} ${hours} hr ${mins} min`;
    } else if (hours > 0) {
      timeStr = `${hours} hr ${mins} min`;
    } else {
      timeStr = `${mins} min`;
    }

    let html = '<div class="stats-numbers">';
    html += `<span class="stat-item">📄 Returns filed (${filedLabel}): ${filedValue}</span>`;
    html += `<span class="stat-item">✅ Returns reviewed: ${reviewedValue}</span>`;
    if (stats.avgMinutesPerReturn !== null) {
      html += `<span class="stat-item">⏱️ Avg time/return: <strong>${formatMinutes(stats.avgMinutesPerReturn)}</strong></span>`;
    }
    html += `<span class="stat-item">🕐 Total volunteer time: <strong>${timeStr}</strong></span>`;
    html += '</div>';

    // --- Clinic benchmarks ---
    const hasAnyBenchmark = stats.overallAvgReturnsPerFiler !== null
      || stats.overallAvgReviewsPerReviewer !== null
      || stats.overallAvgMinutesPerReturn !== null;

    if (hasAnyBenchmark) {
      html += '<div class="stats-benchmarks">';
      html += '<div class="stats-benchmarks-title">Clinic Averages</div>';
      html += '<div class="stats-numbers">';
      if (stats.overallAvgReturnsPerFiler !== null) {
        html += `<span class="stat-item stat-benchmark">📊 Returns filed / filer: <strong>${stats.overallAvgReturnsPerFiler}</strong></span>`;
      }
      if (stats.overallAvgReviewsPerReviewer !== null) {
        html += `<span class="stat-item stat-benchmark">📊 Reviews / reviewer: <strong>${stats.overallAvgReviewsPerReviewer}</strong></span>`;
      }
      if (stats.overallAvgMinutesPerReturn !== null) {
        html += `<span class="stat-item stat-benchmark">⏱️ Avg time / return: <strong>${formatMinutes(stats.overallAvgMinutesPerReturn)}</strong></span>`;
      }
      html += '</div></div>';
    }

    statsContent.innerHTML = html;
  }
</script>
