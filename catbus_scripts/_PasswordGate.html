<style>
  #password-gate-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  #password-gate-box {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    padding: 36px 40px;
    width: 320px;
    text-align: center;
  }
  #password-gate-box h2 {
    margin: 0 0 8px;
    font-size: 1.2rem;
    color: #333;
  }
  #password-gate-box p {
    margin: 0 0 20px;
    font-size: 0.9rem;
    color: #666;
  }
  #password-gate-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    margin-bottom: 12px;
  }
  #password-gate-input:focus {
    outline: none;
    border-color: #4a90e2;
  }
  #password-gate-submit {
    width: 100%;
    padding: 10px;
    background: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
  }
  #password-gate-submit:disabled {
    background: #a0b8d8;
    cursor: default;
  }
  #password-gate-error {
    margin-top: 10px;
    color: #c0392b;
    font-size: 0.85rem;
    min-height: 1.1em;
  }
</style>

<div id="password-gate-overlay">
  <div id="password-gate-box">
    <h2>Admin Access</h2>
    <p>Enter the admin password to continue.</p>
    <input id="password-gate-input" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="password-gate-submit">Unlock</button>
    <div id="password-gate-error"></div>
  </div>
</div>

<script>
(function () {
  var SESSION_KEY = 'catbus_admin_auth';
  var overlay = document.getElementById('password-gate-overlay');
  var input = document.getElementById('password-gate-input');
  var btn = document.getElementById('password-gate-submit');
  var errDiv = document.getElementById('password-gate-error');

  // Already authenticated this session — hide immediately
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    overlay.style.display = 'none';
    return;
  }

  function attempt() {
    var pw = input.value;
    if (!pw) return;
    btn.disabled = true;
    btn.textContent = 'Checking…';
    errDiv.textContent = '';
    google.script.run
      .withSuccessHandler(function (ok) {
        if (ok) {
          sessionStorage.setItem(SESSION_KEY, '1');
          overlay.style.display = 'none';
        } else {
          errDiv.textContent = 'Incorrect password.';
          input.value = '';
          input.focus();
          btn.disabled = false;
          btn.textContent = 'Unlock';
        }
      })
      .withFailureHandler(function () {
        errDiv.textContent = 'Error checking password. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Unlock';
      })
      .checkAdminPassword(pw);
  }

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') attempt();
  });
  input.focus();
})();
</script>
