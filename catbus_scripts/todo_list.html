<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <style>
    :root {
      --accent:  rgb(142, 0, 0);
      --bg:      #ffffff;
      --text:    #1a1a1a;
      --card-bg: #f2f2f2;
      --border:  #ccc;
      --red:     #e74c3c;
      --orange:  #e67e22;
      --yellow:  #f1c40f;
      --green:   #27ae60;
    }
    body { margin: 0 auto; font-family: 'Segoe UI', Verdana, sans-serif; padding: 20px; max-width: 1100px; background: var(--bg); color: var(--text); }
    h1 { margin: 0 0 4px; color: var(--accent); }
    .subtitle { margin: 0 0 20px; color: #666; font-size: 0.9rem; }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-add { margin-left: auto; padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-add:hover { opacity: 0.85; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead th { background: var(--card-bg); padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tbody tr:hover { background: #fafafa; }
    tbody tr.urgency-red   { border-left: 4px solid var(--red); }
    tbody tr.urgency-orange { border-left: 4px solid var(--orange); }
    tbody tr.urgency-yellow { border-left: 4px solid var(--yellow); }
    tbody tr.urgency-green  { border-left: 4px solid var(--green); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
    .badge-not-started { background: #eee; color: #555; }
    .badge-in-progress { background: #dbeafe; color: #1d4ed8; }
    .badge-done        { background: #dcfce7; color: #166534; }
    .days-chip { font-weight: 700; }
    .days-overdue { color: var(--red); }
    .days-soon    { color: var(--orange); }
    .days-warning { color: #b58900; }
    .days-ok      { color: var(--green); }
    .link-edit { color: var(--accent); text-decoration: underline; cursor: pointer; font-size: 0.85rem; }
    .empty-state { text-align: center; padding: 40px; color: #999; }

    /* ── Manage People section ── */
    .people-toggle { display: flex; align-items: center; gap: 8px; margin-top: 28px; cursor: pointer; user-select: none; font-weight: 600; color: var(--accent); border: none; background: none; font-size: 1rem; padding: 0; }
    .people-section { display: none; margin-top: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
    .people-section.open { display: block; }
    .people-section h3 { margin: 0 0 12px; font-size: 1rem; }
    .people-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-bottom: 16px; }
    .people-table th, .people-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .people-table th { font-weight: 600; background: #e8e8e8; }
    .btn-delete { padding: 4px 10px; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .btn-delete:hover { opacity: 0.85; }
    .add-person-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .add-person-form input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; flex: 1; min-width: 140px; }
    .btn-add-person { padding: 8px 16px; background: #27ae60; color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
    .btn-add-person:hover { opacity: 0.85; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; padding: 28px; width: 100%; max-width: 520px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal h2 { margin: 0 0 20px; font-size: 1.2rem; color: var(--accent); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; box-sizing: border-box; padding: 9px 11px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .checkboxes { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkboxes label { font-weight: normal; display: flex; align-items: center; gap: 5px; font-size: 0.88rem; cursor: pointer; }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
    .btn-save { padding: 9px 22px; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .btn-cancel { padding: 9px 22px; background: #eee; color: #333; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .btn-delete-task { padding: 9px 18px; background: var(--red); color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; margin-right: auto; }
    .status-msg { font-size: 0.85rem; margin-top: 8px; min-height: 18px; }
    .status-msg.error { color: var(--red); }
    .status-msg.success { color: var(--green); }
  </style>
</head>
<body>

<h1>To-Do List</h1>
<p class="subtitle">Clinic action items and deadlines for coordinators.</p>

<!-- Toolbar -->
<div class="toolbar">
  <div class="filter-group" id="catFilter">
    <button class="filter-btn active" data-cat="All" onclick="setFilter('cat','All',this)">All Categories</button>
    <button class="filter-btn" data-cat="Clinic Prep" onclick="setFilter('cat','Clinic Prep',this)">Clinic Prep</button>
    <button class="filter-btn" data-cat="Volunteer Management" onclick="setFilter('cat','Volunteer Management',this)">Volunteer Management</button>
  </div>
  <div class="filter-group" id="statusFilter">
    <button class="filter-btn active" data-status="All" onclick="setFilter('status','All',this)">All Statuses</button>
    <button class="filter-btn" data-status="Not Started" onclick="setFilter('status','Not Started',this)">Not Started</button>
    <button class="filter-btn" data-status="In Progress" onclick="setFilter('status','In Progress',this)">In Progress</button>
    <button class="filter-btn" data-status="Done" onclick="setFilter('status','Done',this)">Done</button>
  </div>
  <button class="btn-add" onclick="openAddModal()">+ Add Task</button>
</div>

<!-- Task Table -->
<table id="taskTable">
  <thead>
    <tr>
      <th>Title</th>
      <th>Category</th>
      <th>Due Date</th>
      <th>Responsible</th>
      <th>Status</th>
      <th>Days Until Due</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="taskTableBody">
    <tr><td colspan="7" class="empty-state">Loading…</td></tr>
  </tbody>
</table>

<!-- Manage People Toggle -->
<button class="people-toggle" onclick="togglePeople()">
  <span id="peopleArrow">▶</span> Manage People
</button>
<div class="people-section" id="peopleSection">
  <h3>Coordinators</h3>
  <table class="people-table">
    <thead><tr><th>Name</th><th>Email</th><th></th></tr></thead>
    <tbody id="peopleTableBody"><tr><td colspan="3">Loading…</td></tr></tbody>
  </table>
  <div class="add-person-form">
    <input type="text" id="newPersonName" placeholder="Name" />
    <input type="email" id="newPersonEmail" placeholder="Email" />
    <button class="btn-add-person" onclick="addPerson()">Add Person</button>
  </div>
  <div class="status-msg" id="peopleStatus"></div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="modalTitle">Add Task</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="fTitle" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="fDesc"></textarea>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="fCategory">
        <option>Clinic Prep</option>
        <option>Volunteer Management</option>
      </select>
    </div>
    <div class="form-group">
      <label>Due Date *</label>
      <input type="date" id="fDueDate" />
    </div>
    <div class="form-group">
      <label>Responsible Individuals</label>
      <div class="checkboxes" id="fResponsible"></div>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="fStatus">
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Done</option>
      </select>
    </div>
    <div class="status-msg" id="modalStatus"></div>
    <div class="modal-actions">
      <button class="btn-delete-task" id="btnDelete" style="display:none" onclick="deleteTask()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<script>
  var allItems = [];
  var coordinators = [];
  var editingRowIndex = null;
  var filterCat = 'All';
  var filterStatus = 'All';

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    loadCoordinators();
    loadTasks();
  }

  function loadTasks() {
    google.script.run
      .withSuccessHandler(function(items) {
        allItems = items;
        renderTable();
      })
      .withFailureHandler(function(err) {
        document.getElementById('taskTableBody').innerHTML =
          '<tr><td colspan="7" class="empty-state" style="color:#e74c3c;">Error loading tasks: ' + err.message + '</td></tr>';
      })
      .getTodoItems();
  }

  function loadCoordinators() {
    google.script.run
      .withSuccessHandler(function(list) {
        coordinators = list;
        renderPeople();
      })
      .withFailureHandler(function(err) {
        document.getElementById('peopleStatus').textContent = 'Error loading coordinators: ' + err.message;
        document.getElementById('peopleStatus').className = 'status-msg error';
      })
      .getCoordinators();
  }

  // ── Table Rendering ───────────────────────────────────────────────────────
  function renderTable() {
    var tbody = document.getElementById('taskTableBody');
    var filtered = allItems.filter(function(item) {
      var catOk = filterCat === 'All' || item.category === filterCat;
      var statusOk = filterStatus === 'All' || item.status === filterStatus;
      return catOk && statusOk;
    });

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No tasks found.</td></tr>';
      return;
    }

    // Sort: non-done by daysUntil ascending, done last
    filtered.sort(function(a, b) {
      if (a.status === 'Done' && b.status !== 'Done') return 1;
      if (b.status === 'Done' && a.status !== 'Done') return -1;
      return daysUntil(a.dueDate) - daysUntil(b.dueDate);
    });

    tbody.innerHTML = filtered.map(function(item) {
      var days = daysUntil(item.dueDate);
      var urgencyClass = urgency(item, days);
      var daysLabel = daysLabel_(item, days);
      var badgeClass = { 'Not Started': 'badge-not-started', 'In Progress': 'badge-in-progress', 'Done': 'badge-done' }[item.status] || 'badge-not-started';
      return '<tr class="' + urgencyClass + '">' +
        '<td>' + esc(item.title) + '</td>' +
        '<td>' + esc(item.category) + '</td>' +
        '<td>' + esc(item.dueDate) + '</td>' +
        '<td>' + esc(item.responsibleIndividuals || '—') + '</td>' +
        '<td><span class="badge ' + badgeClass + '">' + esc(item.status) + '</span></td>' +
        '<td><span class="days-chip ' + daysColorClass(item, days) + '">' + daysLabel + '</span></td>' +
        '<td><span class="link-edit" onclick="openEditModal(' + item.rowIndex + ')">Edit</span></td>' +
        '</tr>';
    }).join('');
  }

  function daysUntil(dateStr) {
    if (!dateStr) return 9999;
    var today = new Date(); today.setHours(0,0,0,0);
    var due = new Date(dateStr); due.setHours(0,0,0,0);
    return Math.round((due - today) / 86400000);
  }

  function urgency(item, days) {
    if (item.status === 'Done') return 'urgency-green';
    if (days <= 1) return 'urgency-red';
    if (days <= 7) return 'urgency-orange';
    if (days <= 14) return 'urgency-yellow';
    return 'urgency-green';
  }

  function daysColorClass(item, days) {
    if (item.status === 'Done') return 'days-ok';
    if (days < 0) return 'days-overdue';
    if (days <= 1) return 'days-overdue';
    if (days <= 7) return 'days-soon';
    if (days <= 14) return 'days-warning';
    return 'days-ok';
  }

  function daysLabel_(item, days) {
    if (item.status === 'Done') return 'Done';
    if (days < 0) return 'Overdue (' + Math.abs(days) + 'd)';
    if (days === 0) return 'Due Today';
    if (days === 1) return 'Due Tomorrow';
    return days + ' days';
  }

  // ── Filters ───────────────────────────────────────────────────────────────
  function setFilter(type, value, btn) {
    if (type === 'cat') {
      filterCat = value;
      document.querySelectorAll('#catFilter .filter-btn').forEach(function(b) { b.classList.remove('active'); });
    } else {
      filterStatus = value;
      document.querySelectorAll('#statusFilter .filter-btn').forEach(function(b) { b.classList.remove('active'); });
    }
    btn.classList.add('active');
    renderTable();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openAddModal() {
    editingRowIndex = null;
    document.getElementById('modalTitle').textContent = 'Add Task';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fCategory').value = 'Clinic Prep';
    document.getElementById('fDueDate').value = '';
    document.getElementById('fStatus').value = 'Not Started';
    document.getElementById('btnDelete').style.display = 'none';
    document.getElementById('modalStatus').textContent = '';
    renderResponsibleCheckboxes([]);
    document.getElementById('taskModal').classList.add('open');
  }

  function openEditModal(rowIndex) {
    var item = allItems.find(function(i) { return i.rowIndex === rowIndex; });
    if (!item) return;
    editingRowIndex = rowIndex;
    document.getElementById('modalTitle').textContent = 'Edit Task';
    document.getElementById('fTitle').value = item.title;
    document.getElementById('fDesc').value = item.description || '';
    document.getElementById('fCategory').value = item.category;
    document.getElementById('fDueDate').value = item.dueDate;
    document.getElementById('fStatus').value = item.status;
    document.getElementById('btnDelete').style.display = 'inline-block';
    document.getElementById('modalStatus').textContent = '';
    var selected = (item.responsibleIndividuals || '').split(',').map(function(s) { return s.trim(); });
    renderResponsibleCheckboxes(selected);
    document.getElementById('taskModal').classList.add('open');
  }

  function renderResponsibleCheckboxes(selected) {
    var container = document.getElementById('fResponsible');
    if (!coordinators.length) {
      container.innerHTML = '<span style="color:#999;font-size:0.85rem;">No coordinators configured. Add people below.</span>';
      return;
    }
    container.innerHTML = coordinators.map(function(c) {
      var checked = selected.indexOf(c.name) >= 0 ? ' checked' : '';
      return '<label><input type="checkbox" value="' + esc(c.name) + '"' + checked + '> ' + esc(c.name) + '</label>';
    }).join('');
  }

  function closeModal() {
    document.getElementById('taskModal').classList.remove('open');
  }

  function getFormData() {
    var checked = Array.from(document.querySelectorAll('#fResponsible input:checked')).map(function(cb) { return cb.value; });
    return {
      title:                  document.getElementById('fTitle').value.trim(),
      description:            document.getElementById('fDesc').value.trim(),
      category:               document.getElementById('fCategory').value,
      dueDate:                document.getElementById('fDueDate').value,
      responsibleIndividuals: checked.join(', '),
      status:                 document.getElementById('fStatus').value
    };
  }

  function saveTask() {
    var data = getFormData();
    var statusEl = document.getElementById('modalStatus');
    if (!data.title) { statusEl.textContent = 'Title is required.'; statusEl.className = 'status-msg error'; return; }
    if (!data.dueDate) { statusEl.textContent = 'Due date is required.'; statusEl.className = 'status-msg error'; return; }
    statusEl.textContent = 'Saving…'; statusEl.className = 'status-msg';

    if (editingRowIndex === null) {
      google.script.run
        .withSuccessHandler(function() { closeModal(); loadTasks(); })
        .withFailureHandler(function(err) { statusEl.textContent = 'Error: ' + err.message; statusEl.className = 'status-msg error'; })
        .createTodoItem(data);
    } else {
      google.script.run
        .withSuccessHandler(function() { closeModal(); loadTasks(); })
        .withFailureHandler(function(err) { statusEl.textContent = 'Error: ' + err.message; statusEl.className = 'status-msg error'; })
        .updateTodoItem(editingRowIndex, data);
    }
  }

  function deleteTask() {
    if (!editingRowIndex) return;
    if (!confirm('Delete this task? This cannot be undone.')) return;
    google.script.run
      .withSuccessHandler(function() { closeModal(); loadTasks(); })
      .withFailureHandler(function(err) { document.getElementById('modalStatus').textContent = 'Error: ' + err.message; })
      .deleteTodoItem(editingRowIndex);
  }

  // ── Manage People ─────────────────────────────────────────────────────────
  function togglePeople() {
    var section = document.getElementById('peopleSection');
    var arrow = document.getElementById('peopleArrow');
    var isOpen = section.classList.toggle('open');
    arrow.textContent = isOpen ? '▼' : '▶';
  }

  function renderPeople() {
    var tbody = document.getElementById('peopleTableBody');
    if (!coordinators.length) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:#999;">No coordinators yet.</td></tr>';
      return;
    }
    tbody.innerHTML = coordinators.map(function(c) {
      return '<tr>' +
        '<td>' + esc(c.name) + '</td>' +
        '<td>' + esc(c.email) + '</td>' +
        '<td><button class="btn-delete" onclick="deletePerson(' + c.rowIndex + ')">Remove</button></td>' +
        '</tr>';
    }).join('');
  }

  function addPerson() {
    var name = document.getElementById('newPersonName').value.trim();
    var email = document.getElementById('newPersonEmail').value.trim();
    var statusEl = document.getElementById('peopleStatus');
    if (!name || !email) { statusEl.textContent = 'Name and email are required.'; statusEl.className = 'status-msg error'; return; }
    statusEl.textContent = 'Adding…'; statusEl.className = 'status-msg';
    google.script.run
      .withSuccessHandler(function() {
        document.getElementById('newPersonName').value = '';
        document.getElementById('newPersonEmail').value = '';
        statusEl.textContent = 'Added.'; statusEl.className = 'status-msg success';
        loadCoordinators();
      })
      .withFailureHandler(function(err) { statusEl.textContent = 'Error: ' + err.message; statusEl.className = 'status-msg error'; })
      .addCoordinator({ name: name, email: email });
  }

  function deletePerson(rowIndex) {
    if (!confirm('Remove this coordinator?')) return;
    google.script.run
      .withSuccessHandler(function() { loadCoordinators(); })
      .withFailureHandler(function(err) { document.getElementById('peopleStatus').textContent = 'Error: ' + err.message; })
      .deleteCoordinator(rowIndex);
  }

  // ── Utilities ─────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modal on overlay click
  document.getElementById('taskModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  init();
</script>
</body>
</html>
