<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <?!= include('shared_styles') ?>
  <style>
    #container, #reviewContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .request {
      padding: 16px 20px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      box-shadow: var(--shadow-light);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .request:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .request.active {
      background-color: #f4b400;
    }

    .request.escalated {
      background-color: #d93025;
      animation: pulse 1.2s infinite;
    }

    .request.review {
      background-color: #4285f4;
    }

    .request.review-senior {
      background-color: #7b1fa2;
    }

    .request.review-inprogress {
      background-color: #00897b;
    }

    .cancel-btn {
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 0.8em;
      font-weight: 700;
      background: rgba(255,255,255,0.25);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      cursor: pointer;
    }

    .cancel-btn:hover {
      background: rgba(255,255,255,0.4);
    }

    h3 {
      margin-top: 40px;
      margin-bottom: 20px;
      font-size: 1.3em;
      color: var(--accent-color);
      border-bottom: 2px solid var(--accent-color);
      padding-bottom: 8px;
    }

    h3:first-of-type {
      margin-top: 0;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }

    .nav-link {
      font-size: 0.85em;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      opacity: 0.8;
    }

    .nav-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
<body class="light">
  <?!= include('_PasswordGate') ?>
  <header>
    <div>
      <button aria-label="Toggle dark mode" class="toggle-theme" onclick="toggleTheme()">☀️</button>
    </div>
  </header>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
    <h3 style="margin: 0;">🚨 Alert Dashboard</h3>
    <div style="display: flex; align-items: center; gap: 12px;">
      <a class="nav-link" id="homeLink" href="#">🏠 Home</a>
      <a class="nav-link" id="adminLink" href="#">📊 Admin Dashboard</a>
      <button onclick="refresh()" style="padding: 8px 16px; font-size: 0.9em; background-color: var(--accent-color); color: white; border: none; border-radius: 5px; cursor: pointer;">🔄 Refresh</button>
    </div>
  </div>

  <h3>🆘 Help Requests</h3>
  <div id="container">Loading help requests...</div>

  <h3>📋 Review Requests</h3>
  <div id="reviewContainer">Loading review requests...</div>

  <div id="messageBox"></div>
  <div id="errorBox"></div>

<?!= include('shared_scripts') ?>
<script>
  const BASE_URL = <?!= JSON.stringify(baseUrl) ?>;
  const ADMIN_WEBSITE_URL = <?!= JSON.stringify(adminWebsiteUrl) ?>;

  let lastRequestsSerialized = "";
  let lastReviewRequestsSerialized = "";

  function formatDuration(minutes) {
    if (minutes === null || minutes === undefined) return '';
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  // Build link to admin dashboard using server-injected deployment URL
  document.getElementById('homeLink').href = ADMIN_WEBSITE_URL;
  document.getElementById('adminLink').href = BASE_URL + '?app=admin';

  function render(requests) {
    const serialized = JSON.stringify(requests);
    if (serialized === lastRequestsSerialized) return;
    lastRequestsSerialized = serialized;

    const container = document.getElementById("container");
    container.innerHTML = "";

    if (requests.length === 0) {
      container.innerHTML = "<p>No active or escalated help requests.</p>";
      return;
    }

    requests.sort((a, b) => (b.minutesAgo ?? 0) - (a.minutesAgo ?? 0));

    for (const req of requests) {
      const isInProgress = req.status === 'in progress';
      const div = document.createElement("div");
      div.className = isInProgress ? 'request review-inprogress' : `request ${req.status}`;
      div.innerHTML = `
        <div><strong>${req.station ? `Station ${escapeHtml(req.station)} – ` : ''}${escapeHtml(req.volunteer)}</strong></div>
        <div>⏱️ ${formatDuration(req.minutesAgo)} ago</div>
        <div>🕒 ${escapeHtml(req.timestamp)}</div>
        ${isInProgress
          ? `<div style="margin-top:8px; font-size:0.85em; opacity:0.9;">🔄 In Progress</div>
           <button class="cancel-btn" data-volunteer="${escapeHtml(req.volunteer)}" onclick="cancelHelp(this.dataset.volunteer)">Cancel</button>`
          : `<button class="cancel-btn" data-volunteer="${escapeHtml(req.volunteer)}" onclick="cancelHelp(this.dataset.volunteer)">Cancel</button>`
        }
      `;
      container.appendChild(div);
    }
  }

  function renderReviewRequests(requests) {
    const serialized = JSON.stringify(requests);
    if (serialized === lastReviewRequestsSerialized) return;
    lastReviewRequestsSerialized = serialized;

    const container = document.getElementById("reviewContainer");
    container.innerHTML = "";

    if (requests.length === 0) {
      container.innerHTML = "<p>No active review requests.</p>";
      return;
    }

    const visible = requests.filter(r => r.status !== 'in progress');

    if (visible.length === 0) {
      container.innerHTML = "<p>No active review requests.</p>";
      return;
    }

    visible.sort((a, b) => (b.minutesAgo ?? 0) - (a.minutesAgo ?? 0));

    for (const req of visible) {
      const div = document.createElement("div");
      div.className = `request ${req.needsSeniorReview ? 'review-senior' : 'review'}`;
      div.innerHTML = `
        ${req.needsSeniorReview ? '<div style="font-size:0.8em; opacity:0.85;">★ Senior Review Required</div>' : ''}
        <div><strong>${req.station ? `Station ${escapeHtml(req.station)} – ` : ''}${escapeHtml(req.volunteer)}</strong></div>
        <div>⏱️ ${formatDuration(req.minutesAgo)} ago</div>
        <div>🕒 ${escapeHtml(req.timestamp)}</div>
        <button class="cancel-btn" data-volunteer="${escapeHtml(req.volunteer)}" onclick="cancelReview(this.dataset.volunteer)">Cancel</button>
      `;
      container.appendChild(div);
    }
  }

  function cancelHelp(volunteer) {
    google.script.run
      .withFailureHandler(function() {})
      .clearHelpRequest(volunteer);
  }

  function cancelReview(volunteer) {
    google.script.run
      .withFailureHandler(function() {})
      .cancelReviewRequest(volunteer);
  }

  function refresh() {
    google.script.run
      .withSuccessHandler(function(data) {
        render(data.helpRequests);
        renderReviewRequests(data.reviewRequests);
        setTimeout(refresh, 3000);
      })
      .withFailureHandler(function() {
        setTimeout(refresh, 3000);
      })
      .getAlertDashboardData();
  }

  window.addEventListener('load', function() {
    refresh();
  });
</script>
<div class="footer-copyright">The Client And Tax Booking Utility System (CATBUS) is designed for use only by UW AFSA Tax Clinic.</div>
</body>
</html>
