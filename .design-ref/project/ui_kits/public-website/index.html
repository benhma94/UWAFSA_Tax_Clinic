<!doctype html>
<html lang="en-US">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tax Clinic — AFSA · Public site kit</title>
<link rel="icon" href="../../assets/favicon.ico" />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css" />
<script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark-mode');})();</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState('home');
  const [status, setStatus] = useState('open');
  window.__setPage = setPage;
  const pages = { home: <HomePage status={status} setStatus={setStatus} />, faq: <FAQPage />, checklist: <ChecklistPage />, postfiling: <PostFilingPage />, about: <AboutPage />, volunteer: <VolunteerPage /> };
  return (
    <>
      <Header />
      <Nav page={page} setPage={setPage} />
      <div id="content" key={page}><div className="sqs-html-content">{pages[page]}</div></div>
      <Footer />
      <DarkModeToggle />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
