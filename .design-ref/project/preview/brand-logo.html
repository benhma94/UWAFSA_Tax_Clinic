<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:'Lexend',sans-serif;display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:center}
  .a{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:24px;text-align:center}
  .b{background:#0F172A;border-radius:12px;padding:24px;text-align:center}
  img{max-width:220px;height:auto}
  .cap{font-size:11px;color:#64748B;margin-top:8px;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
  .b .cap{color:#A3A3A3}
</style></head><body>
<div class="a"><img src="../assets/logo.png" alt="AFSA"><div class="cap">on light surface</div></div>
<div class="b"><img src="../assets/logo.png" alt="AFSA"><div class="cap">on dark surface</div></div>
</body></html>
