<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:34px 24px;background:#F8FAFC;font-family:'Source Sans 3',sans-serif;display:flex;gap:24px;justify-content:center}
  .c{width:160px;height:120px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:14px;display:flex;flex-direction:column;justify-content:flex-end}
  .c b{font-family:'Lexend',sans-serif;font-size:14px;color:#0F172A;display:block}
  .c code{font-size:10px;color:#64748B;line-height:1.4}
  .sm{box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04)}
  .md{box-shadow:0 4px 12px rgba(15,23,42,.08),0 2px 4px rgba(15,23,42,.04)}
  .lg{box-shadow:0 8px 24px rgba(15,23,42,.10),0 4px 8px rgba(15,23,42,.06)}
</style></head><body>
<div class="c sm"><b>Shadow sm</b><code>cards at rest</code></div>
<div class="c md"><b>Shadow md</b><code>hover + modals</code></div>
<div class="c lg"><b>Shadow lg</b><code>dropdowns</code></div>
</body></html>
