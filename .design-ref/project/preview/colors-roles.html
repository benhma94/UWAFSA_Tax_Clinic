<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:22px;background:#fff;font-family:'Segoe UI',sans-serif}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .role{border-radius:10px;padding:16px;color:#fff;font-weight:600}
  .role b{display:block;font-size:15px;margin-bottom:2px}
  .role code{opacity:.85;font-size:11px}
</style></head>
<body>
<div class="row">
  <div class="role" style="background:#3498db"><b>Mentor</b><code>#3498db</code></div>
  <div class="role" style="background:#2ecc71"><b>Frontline</b><code>#2ecc71</code></div>
  <div class="role" style="background:#9b59b6"><b>Filer</b><code>#9b59b6</code></div>
  <div class="role" style="background:#e74c3c"><b>Internal Services</b><code>#e74c3c</code></div>
</div>
</body></html>
