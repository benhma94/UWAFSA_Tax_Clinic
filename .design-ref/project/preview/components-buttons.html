<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .web{background:#c0392b;color:#fff;padding:8px 20px;border-radius:4px;font-family:var(--font-body);font-weight:600;font-size:.95rem;text-decoration:none;border:none;cursor:pointer}
  .web:hover{background:#922b21}
  .cb{padding:12px 16px;border:none;border-radius:8px;font-weight:600;background:#8e0000;color:#fff;font-family:'Segoe UI',sans-serif;cursor:pointer;box-shadow:0 4px 8px rgba(142,0,0,.3)}
  .secondary{border:1px solid #CBD5E1;background:#fff;color:#334155;padding:6px 12px;border-radius:4px;font-family:'Lexend',sans-serif;font-weight:500;font-size:.875rem;cursor:pointer}
  .ghost{background:none;border:none;color:#c0392b;font-family:'Lexend',sans-serif;font-weight:500;font-size:.875rem;padding:6px 12px;cursor:pointer}
</style></head><body>
<a class="web" href="#">Download Checklist (PDF)</a>
<button class="cb">Assign Client</button>
<button class="cb" style="background:#c0392b;box-shadow:none">🗑️ Remove</button>
<button class="secondary">Refresh</button>
<button class="ghost">Cancel</button>
</body></html>
