<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{height:110px;border-radius:8px;border:1px solid #e2e8f0;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-family:var(--font-body);font-size:11px}
  .sw b{font-family:var(--font-heading);font-size:12px;display:block}
  .dark{color:#F5F5F5;border-color:#333}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#F8FAFC"><b>bg</b>#F8FAFC</div>
  <div class="sw" style="background:#F1F5F9"><b>bg-2</b>#F1F5F9</div>
  <div class="sw" style="background:#E8EDF3"><b>bg-3</b>#E8EDF3</div>
  <div class="sw" style="background:#CBD5E1"><b>border-mid</b>#CBD5E1</div>
  <div class="sw dark" style="background:#64748B"><b>muted</b>#64748B</div>
  <div class="sw dark" style="background:#334155"><b>body</b>#334155</div>
  <div class="sw dark" style="background:#0F172A"><b>text</b>#0F172A</div>
</div>
</body></html>
