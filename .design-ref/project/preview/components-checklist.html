<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:22px;background:#fff;font-family:'Source Sans 3',sans-serif;color:#334155;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .g{border:1px solid #e8e8e8;border-radius:6px;padding:10px 18px;background:#fdfcfc}
  .label{font-family:'Lexend',sans-serif;font-weight:700;border-left:3px solid #c0392b;padding:4px 10px;background:#fafafa;margin:8px -10px;font-size:.95rem;color:#0F172A}
  ul{list-style:none;padding:0;margin:0}
  li{padding-left:26px;position:relative;padding-top:4px}
  .bring li::before{content:'✓';position:absolute;left:4px;color:#27ae60;font-weight:700}
  .avoid li::before{content:'✕';position:absolute;left:4px;color:#c0392b;font-weight:700}
</style></head><body>
<div class="g">
  <p class="label">Bring to Tax Clinic</p>
  <ul class="bring"><li>Government-issued photo ID</li><li>SIN or ITN</li><li>T4, T4A, T5 slips</li><li>2024 Notice of Assessment</li></ul>
</div>
<div class="g" style="background:#fff5f5;border-left:4px solid #c0392b">
  <p class="label">Don't Bring</p>
  <ul class="avoid"><li>Home Office Expenses</li><li>Pay Stubs</li><li>GST/HST Notice of Assessments</li></ul>
</div>
</body></html>
