<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:'Source Sans 3',sans-serif}
  label{display:block;font-family:'Lexend',sans-serif;font-weight:500;font-size:13px;color:#0F172A;margin-bottom:6px}
  input,select{width:100%;padding:8px 12px;border:1px solid #CBD5E1;border-radius:4px;font-family:inherit;font-size:14px;color:#0F172A;background:#fff;box-sizing:border-box}
  .focused{outline:2px solid #c0392b;outline-offset:2px;border-color:#c0392b;box-shadow:0 0 0 3px rgba(192,57,43,.12)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
</style></head><body>
<div class="row">
  <div><label>Taxpayer name</label><input placeholder="Full name"></div>
  <div><label>Filing year</label><input class="focused" value="2025"></div>
</div>
<div style="margin-top:14px"><label>Household size</label><input type="number" value="1" style="width:90px"></div>
</body></html>
