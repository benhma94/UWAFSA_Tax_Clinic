<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:26px;background:#fff;font-family:'Segoe UI',sans-serif;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .hp{background:#c0392b;color:#fff;padding:3px 10px;border-radius:3px;font-size:.85em;font-weight:700;letter-spacing:.4px}
  .role{padding:4px 10px;border-radius:4px;color:#fff;font-size:.8em;font-weight:600}
  .warn{background:#fff3cd;color:#7a5d00;padding:4px 10px;border-radius:4px;font-weight:600;font-size:.85em}
  .danger{background:#ffcccc;color:#8e0000;padding:4px 10px;border-radius:4px;font-weight:600;font-size:.85em;animation:p 1.5s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.6}}
</style></head><body>
<span class="hp">HIGH PRIORITY</span>
<span class="role" style="background:#3498db">Mentor</span>
<span class="role" style="background:#2ecc71">Frontline</span>
<span class="role" style="background:#9b59b6">Filer</span>
<span class="role" style="background:#e74c3c">Internal Services</span>
<span class="warn">⏱️ 18m wait</span>
<span class="danger">⏱️ 32m wait</span>
</body></html>
