<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .sw{height:110px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;font-family:var(--font-body)}
  .sw b{font-family:var(--font-heading);font-size:13px;display:block;margin-bottom:2px}
  .sw code{font-size:11px;opacity:.85}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#8e0000"><b>AFSA Red</b><code>rgb(142,0,0)</code></div>
  <div class="sw" style="background:#c0392b"><b>Web Crimson</b><code>#c0392b</code></div>
  <div class="sw" style="background:#922b21"><b>Crimson Pressed</b><code>#922b21</code></div>
  <div class="sw" style="background:#980000"><b>Chart Red</b><code>#980000</code></div>
  <div class="sw" style="background:#E05252;color:#1a1a1a"><b>DM Accent</b><code>#E05252</code></div>
</div>
</body></html>
