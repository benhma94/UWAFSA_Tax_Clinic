<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#F8FAFC;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px 18px 34px;box-shadow:0 1px 3px rgba(15,23,42,.06);position:relative;transition:all .2s ease}
  .card.hover{transform:translateY(-3px);box-shadow:0 4px 12px rgba(15,23,42,.08);border-color:#c0392b}
  .t{font-family:'Lexend',sans-serif;font-weight:700;font-size:1rem;color:#c0392b;margin:0 0 4px}
  .d{font-size:.875rem;color:#64748B;margin:0;line-height:1.5}
  .card.hover::after{content:'→';position:absolute;bottom:14px;right:16px;color:#c0392b;font-size:1.1rem}
</style></head><body>
<div class="grid">
  <div class="card"><p class="t">Queue Dashboard</p><p class="d">Live walk-in queue with priority flags and wait-time alerts.</p></div>
  <div class="card hover"><p class="t">Volunteer Management</p><p class="d">Roster, role tags, and availability tracking.</p></div>
</div>
</body></html>
