<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:22px;background:#f5f5f5;font-family:'Segoe UI',sans-serif}
  table{width:100%;border-collapse:separate;border-spacing:0;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);background:#fff}
  th{background:#8e0000;color:#fff;text-transform:uppercase;font-size:.85em;letter-spacing:.5px;padding:12px 14px;text-align:left}
  td{padding:12px 14px;border-bottom:1px solid #e0e0e0;font-size:14px;color:#1a1a1a}
  tr:nth-child(even) td{background:rgba(0,0,0,.02)}
  tr:last-child td{border-bottom:none}
  .warn td{background:#fff3cd}
  .dan td{background:#ffcccc}
  .hp{background:#c0392b;color:#fff;padding:2px 7px;border-radius:3px;font-size:.8em;font-weight:700;margin-right:6px}
</style></head><body>
<table>
  <thead><tr><th>Client ID</th><th>Wait Time</th><th>Situation</th></tr></thead>
  <tbody>
    <tr><td><span class="hp">HIGH PRIORITY</span>P012</td><td>4 m</td><td>Newcomer · First-Time Filer</td></tr>
    <tr><td>B047</td><td>9 m</td><td>Student · T2202</td></tr>
    <tr class="warn"><td>C118</td><td>18 m</td><td>Married · Children</td></tr>
    <tr class="dan"><td>D204</td><td>32 m</td><td>Student · International</td></tr>
  </tbody>
</table>
</body></html>
