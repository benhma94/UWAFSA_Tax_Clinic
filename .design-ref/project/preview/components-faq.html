<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:22px;background:#F8FAFC;font-family:'Source Sans 3',sans-serif;color:#334155}
  .cat{border:1px solid #E2E8F0;border-radius:8px;margin-bottom:12px;overflow:hidden;background:#fff}
  .cat>.sum{padding:14px 16px;background:#F1F5F9;font-family:'Lexend',sans-serif;font-weight:700;font-size:1.05rem;color:#c0392b;display:flex;gap:10px;align-items:center}
  .sum::before{content:'▶';font-size:.7rem;transform:rotate(90deg);color:#c0392b}
  .q{padding:12px 4px 12px 20px;font-weight:600;color:#0F172A;border-top:1px solid #F1F5F9;position:relative;margin:0 16px}
  .q::before{content:'+';position:absolute;left:0;color:#c0392b;font-weight:700;font-size:1.1rem;transform:rotate(45deg)}
  .a{padding:0 20px 12px;color:#334155;font-size:14px;line-height:1.6}
</style></head><body>
<div class="cat">
  <div class="sum">Our Services</div>
  <div class="q">Can I book an appointment with you?</div>
  <div class="a">No appointment necessary! We operate on a walk-in basis for flexibility.</div>
  <div class="q" style="transform:none">Do you offer online services?</div>
</div>
</body></html>
