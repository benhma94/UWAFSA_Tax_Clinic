<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{height:110px;border-radius:8px;border:1px solid #e0e0e0;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;font-family:'Segoe UI',sans-serif;font-size:11px}
  .sw b{font-size:12px;font-weight:700;display:block}
  .dark{color:#f0f0f0;border-color:#444}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#f5f5f5"><b>bg light</b>#f5f5f5</div>
  <div class="sw" style="background:#ffffff"><b>surface</b>#ffffff</div>
  <div class="sw" style="background:#e0e0e0"><b>border</b>#e0e0e0</div>
  <div class="sw dark" style="background:#444"><b>border DM</b>#444</div>
  <div class="sw dark" style="background:#2a2a2a"><b>surface DM</b>#2a2a2a</div>
  <div class="sw dark" style="background:#1e1e1e"><b>bg DM</b>#1e1e1e</div>
</div>
</body></html>
