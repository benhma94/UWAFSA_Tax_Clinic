<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tax Clinic &mdash; Accounting &amp; Finance Student Association</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
    <link rel="canonical" href="https://taxclinic.uwaterloo.ca"/>
    <meta property="og:site_name" content="Accounting &amp; Finance Student Association"/>
    <meta property="og:title" content="Tax Clinic &mdash; Accounting &amp; Finance Student Association"/>
    <meta property="og:url" content="https://taxclinic.uwaterloo.ca"/>
    <meta property="og:type" content="website"/>
    <meta name="description" content="" />
    <link rel="stylesheet" href="shared.css">
    <style>
      .app-form label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
        margin-top: 16px;
      }
      .app-form .optional {
        font-weight: normal;
        color: #888;
        font-size: 0.9em;
        margin-left: 4px;
      }
      .app-form input[type="text"],
      .app-form input[type="email"],
      .app-form select,
      .app-form textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        font-family: inherit;
        box-sizing: border-box;
      }
      .app-form select {
        height: 38px;
      }
      .app-form textarea {
        min-height: 90px;
        resize: vertical;
      }
      .app-form button[type="submit"] {
        margin-top: 20px;
        padding: 10px 28px;
        background: #8e0000;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .app-form button[type="submit"]:hover:not(:disabled) {
        opacity: 0.85;
      }
      .app-form button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status-msg {
        margin-top: 14px;
        padding: 10px 14px;
        border-radius: 4px;
        display: none;
      }
      .status-msg.success {
        background: #d5f5e3;
        color: #1e8449;
        display: block;
      }
      .status-msg.error {
        background: #fadbd8;
        color: #922b21;
        display: block;
      }
      .status-msg.loading {
        background: #d6eaf8;
        color: #21618c;
        display: block;
      }
    </style>
  </head>
  <body>

  <div id="site-header"></div>
  <div id="site-nav"></div>

  <div id="content">
    <div class="sqs-html-content">
      <h2><strong>2026 Tax Clinic Volunteer Applications</strong></h2>
      <div id="app-root"></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="shared.js"></script>
  <script>
    // Toggle this to open or close applications
    var APPLICATIONS_OPEN = true;

    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyP2xC_8ebErP8m-tZsbRLxuhCZWz6EL4OOXpHVhkzBpUX-V8iYX0JjVxYMcQFJGyTzCQ/exec';

    var root = document.getElementById('app-root');

    if (!APPLICATIONS_OPEN) {
      root.innerHTML = '<p><strong>We have closed volunteer applications for the 2026 Tax Season, we will reopen in November 2026.</strong></p>' +
        '<p>Thank you to all the volunteers who applied, and we look forward to seeing you all at the Tax Clinic!</p>';
    } else {
      root.innerHTML =
        '<p>Fill out the form below to apply to volunteer at the UW AFSA Tax Clinic.</p>' +
        '<form id="appForm" class="app-form" onsubmit="handleSubmit(event)" novalidate>' +

          '<label for="firstName">First Name</label>' +
          '<input type="text" id="firstName" required placeholder="Jane">' +

          '<label for="lastName">Last Name</label>' +
          '<input type="text" id="lastName" required placeholder="Smith">' +

          '<label for="email">Email</label>' +
          '<input type="email" id="email" required placeholder="jsmith@uwaterloo.ca">' +

          '<label for="program">Program</label>' +
          '<input type="text" id="program" required placeholder="e.g. Accounting, AFM, Finance, Math/CPA...">' +

          '<label for="yearOfStudy">Year of Study</label>' +
          '<select id="yearOfStudy" required>' +
            '<option value="">-- Select --</option>' +
            '<option>1st Year</option>' +
            '<option>2nd Year</option>' +
            '<option>3rd Year</option>' +
            '<option>4th Year</option>' +
            '<option>5th Year or above</option>' +
            '<option>Graduate Student</option>' +
          '</select>' +

          '<label for="priorExperience">Prior Experience <span class="optional">(optional)</span></label>' +
          '<textarea id="priorExperience" placeholder="Any previous tax filing, accounting, or volunteer experience..."></textarea>' +

          '<label for="additionalComments">Additional Comments <span class="optional">(optional)</span></label>' +
          '<textarea id="additionalComments" placeholder="Anything else you would like us to know..."></textarea>' +

          '<button type="submit" id="submitBtn">Submit Application</button>' +
          '<div id="statusMsg" class="status-msg"></div>' +
        '</form>';
    }

    function showStatus(msg, type) {
      var el = document.getElementById('statusMsg');
      if (!el) return;
      el.textContent = msg;
      el.className = 'status-msg ' + type;
    }

    function handleSubmit(e) {
      e.preventDefault();

      var firstName = document.getElementById('firstName').value.trim();
      var lastName = document.getElementById('lastName').value.trim();
      var email = document.getElementById('email').value.trim();
      var program = document.getElementById('program').value.trim();
      var yearOfStudy = document.getElementById('yearOfStudy').value;
      var priorExperience = document.getElementById('priorExperience').value.trim();
      var additionalComments = document.getElementById('additionalComments').value.trim();

      if (!firstName || !lastName) {
        showStatus('Please enter your first and last name.', 'error');
        return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showStatus('Please enter a valid email address.', 'error');
        return;
      }
      if (!program) {
        showStatus('Please enter your program.', 'error');
        return;
      }
      if (!yearOfStudy) {
        showStatus('Please select your year of study.', 'error');
        return;
      }

      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      showStatus('Submitting...', 'loading');

      var params = new URLSearchParams({
        action: 'volunteerApplication',
        firstName: firstName,
        lastName: lastName,
        email: email,
        program: program,
        yearOfStudy: yearOfStudy,
        priorExperience: priorExperience,
        additionalComments: additionalComments
      });

      fetch(APPS_SCRIPT_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' })
        .then(function() {
          showStatus('Application submitted! We will be in touch.', 'success');
          document.getElementById('appForm').reset();
        })
        .catch(function() {
          showStatus('Submission failed. Please try again or email us directly.', 'error');
        })
        .finally(function() {
          btn.disabled = false;
        });
    }
  </script>
  </body>
</html>
