<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tax Clinic &mdash; Accounting &amp; Finance Student Association</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
    <link rel="canonical" href="https://taxclinic.uwaterloo.ca"/>
    <meta property="og:site_name" content="Accounting &amp; Finance Student Association"/>
    <meta property="og:title" content="Tax Clinic &mdash; Accounting &amp; Finance Student Association"/>
    <meta property="og:url" content="https://taxclinic.uwaterloo.ca"/>
    <meta property="og:type" content="website"/>
    <meta name="description" content="" />
    <link rel="stylesheet" href="shared.css?v=2">
    <style>
      /* --- Tabs --- */
      .role-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .role-tab {
        padding: 8px 22px;
        border: 2px solid #8e0000;
        border-radius: 4px;
        background: #fff;
        color: #8e0000;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .role-tab:hover { background: #f5e0e0; }
      .role-tab.active { background: #8e0000; color: #fff; }

      /* --- Form panels --- */
      .role-form { display: none; }
      .role-form.active { display: block; }

      /* --- Form fields --- */
      .app-form label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
        margin-top: 16px;
      }
      .app-form .optional {
        font-weight: normal;
        color: #888;
        font-size: 0.9em;
        margin-left: 4px;
      }
      .app-form input[type="text"],
      .app-form input[type="email"],
      .app-form input[type="file"],
      .app-form select,
      .app-form textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        font-family: inherit;
        box-sizing: border-box;
      }
      .app-form input[type="file"] { padding: 5px 10px; }
      .app-form select { height: 38px; }
      .app-form textarea { min-height: 90px; resize: vertical; }

      /* --- Radio groups --- */
      .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 6px;
      }
      .radio-group label {
        font-weight: normal;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      /* --- Screening section --- */
      .screening-section {
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 16px 20px;
        margin-bottom: 24px;
      }
      .screening-section h3 {
        margin: 0 0 12px 0;
        font-size: 1rem;
      }
      .screening-question {
        margin-bottom: 16px;
      }
      .screening-question p {
        margin: 0 0 6px 0;
        font-weight: bold;
      }
      .disqualify-msg {
        margin-top: 6px;
        padding: 8px 12px;
        background: #fadbd8;
        color: #922b21;
        border-radius: 4px;
        font-size: 0.95em;
        display: none;
      }
      .disqualify-msg.show { display: block; }

      /* --- Main form section --- */
      .main-form-section { display: none; }
      .main-form-section.show { display: block; }

      /* --- Submit button & status --- */
      .app-form button[type="submit"] {
        margin-top: 20px;
        padding: 10px 28px;
        background: #8e0000;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .app-form button[type="submit"]:hover:not(:disabled) { opacity: 0.85; }
      .app-form button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

      .status-msg {
        margin-top: 14px;
        padding: 10px 14px;
        border-radius: 4px;
        display: none;
      }
      .status-msg.success { background: #d5f5e3; color: #1e8449; display: block; }
      .status-msg.error   { background: #fadbd8; color: #922b21; display: block; }
      .status-msg.loading { background: #d6eaf8; color: #21618c; display: block; }
    </style>
    <script src="config.js"></script>
  </head>
  <body>

  <div id="site-header"></div>
  <div id="site-nav"></div>

  <div id="content">
    <div class="sqs-html-content">
      <h2><strong>2026 Tax Clinic Volunteer Applications</strong></h2>
      <div id="app-root"></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="shared.js?v=2"></script>
  <script>
    // Toggle this to open or close all applications
    var APPLICATIONS_OPEN = false;

    var APPS_SCRIPT_URL = CATBUS_CONFIG.WEBAPP_URL;

    var root = document.getElementById('app-root');

    if (!APPLICATIONS_OPEN) {
      root.innerHTML =
        '<p><strong>We have closed volunteer applications for the 2026 Tax Season, we will reopen in November 2026.</strong></p>' +
        '<p>Thank you to all the volunteers who applied, and we look forward to seeing you all at the Tax Clinic!</p>';
    } else {
      root.innerHTML =
        '<p>Fill out the form below to apply to volunteer at the UW AFSA Tax Clinic. Select the role you are applying for.</p>' +

        // Tabs
        '<div class="role-tabs">' +
          '<button class="role-tab active" onclick="switchTab(event, \'filer\')">Filer</button>' +
          '<button class="role-tab" onclick="switchTab(event, \'frontline\')">Frontline</button>' +
          '<button class="role-tab" onclick="switchTab(event, \'mentor\')">Mentor</button>' +
        '</div>' +

        // Filer form
        '<div id="form-filer" class="role-form active">' + buildFilerForm() + '</div>' +

        // Frontline form
        '<div id="form-frontline" class="role-form">' + buildFrontlineForm() + '</div>' +

        // Mentor form
        '<div id="form-mentor" class="role-form">' + buildMentorForm() + '</div>';

      // Attach screening listeners after DOM is built
      attachFilerScreening();
      attachFrontlineScreening();
    }

    // -----------------------------------------------------------------------
    // Tab switching
    // -----------------------------------------------------------------------
    function switchTab(evt, role) {
      document.querySelectorAll('.role-tab').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.role-form').forEach(function(d) { d.classList.remove('active'); });
      evt.currentTarget.classList.add('active');
      document.getElementById('form-' + role).classList.add('active');
    }

    // -----------------------------------------------------------------------
    // Filer form builder
    // -----------------------------------------------------------------------
    function buildFilerForm() {
      return (
        '<p><strong>Hi!</strong></p>' +
        '<p>You don\'t know me yet, but you will soon! I\'m Eric Fong and I along with Ben Ma and Rebecca Lee teach the super fun course where you will learn how to prepare personal taxes! You will need to read (not skim) this full blurb in order to complete the application.</p>' +
        '<p>Signing up for the AFSA Tax Clinic is a fantastic opportunity. You will prepare tax returns for real-life people. You will gain exposure to a wide variety of personal tax topics in which you can talk with authority about with recruiters, other professionals and your significant other\'s uncle. Our program is an official program under the Canada Revenue Agency\'s Community Volunteer Income Tax Program, which will provide you with free software (UFile) that we will train you to use.</p>' +
        '<p><strong>Things that you will learn and do:</strong></p>' +
        '<ol>' +
          '<li>How to file basic tax returns.</li>' +
          '<li>Learn basics about the Canadian Tax System, and explain the benefits that people can get from filing tax returns and why they should file a tax return.</li>' +
          '<li>Get insight on what your tax co-ops or career could look like in the future.</li>' +
        '</ol>' +
        '<p>Additionally, we have great feedback from our past volunteers reflecting on how valuable the Tax Clinic experience was for them in building their soft skills.</p>' +
        '<blockquote style="border-left:3px solid #8e0000;margin:8px 0 8px 16px;padding:6px 12px;color:#555;">&ldquo;Co-op made me realize how important communication skills are, especially talking with/ presenting for clients.&rdquo;</blockquote>' +
        '<blockquote style="border-left:3px solid #8e0000;margin:8px 0 8px 16px;padding:6px 12px;color:#555;">&ldquo;Last year Tax Clinic helped me improve my communication skills a lot so a big THANK YOU&rdquo;</blockquote>' +
        '<p>Many of our past volunteers (upper-years and alumni) return to contribute. That\'s how significant the Tax Clinic is to AFSA.</p>' +
        '<p>However, it\'s also a major commitment. The AFSA Tax Clinic prepares real taxes for real people, both at UW and the K-W community. If we select you for a volunteer role and you drop out, it significantly affects how well prepared we are on the tax clinic dates. As one ofthe largest tax clinic in the region preparing over 1,200 returns, we need to ensure our volunteers are prepared and available for the Tax Clinic. We\'ll take care of preparing you, but we are hurt a lot by people who drop out. To help me ensure that you read this blurb in full please select &lsquo;Catbus&rsquo; for the last question.</p>' +
        '<p><strong>The commitment that we ask from you is:</strong></p>' +
        '<p style="margin:4px 0;">1) ASAP after acceptance (approx 1 hour): Register for the CRA CVITP program and for an EFILE number, including filing a tax return for yourself if you haven\'t before (&lt;1 hour).</p>' +
        '<p style="margin:2px 0 2px 2em;">a) Register for CRA CVITP program</p>' +
        '<p style="margin:2px 0 2px 2em;">b) Register for EFILE number</p>' +
        '<p style="margin:2px 0 2px 2em;">c) File a tax return for yourself if you haven\'t before (super easy + free + we give you instructions + maybe free money for you!).</p>' +
        '<p style="margin:4px 0;">2) February 28th: Training session (8 hours)</p>' +
        '<p style="margin:4px 0;">2.5) Week following Training Session: Case-based test (1 hour).</p>' +
        '<p style="margin:4px 0 12px;">3) March 21, 22, 28, 29: A minimum of three (3) shifts spread out over the Tax Clinic dates (12 hours, but much love if you volunteer for more!).</p>' +
        '<p><strong>Note</strong> &ndash; If you\'re an upper year student who\'s volunteering for the Tax Clinic for the first time, we welcome you to apply for the Mentor/Experienced volunteer form instead as a mentor if you\'re comfortable with that, any experience in tax filing is greatly appreciated.</p>' +
        '<p>If you have any questions, send us an email at <a href="mailto:taxclinic@uwafsa.com">taxclinic@uwafsa.com</a>.</p>' +
        '<p>Looking forward to meeting everyone!<br>Eric Fong</p>' +

        // Screening section
        '<div class="screening-section">' +
          '<h3>Eligibility Screening</h3>' +
          '<p style="margin:0 0 12px 0;color:#555;font-size:0.95em;">Please answer all questions below. Your application form will appear if you meet the requirements.</p>' +

          screeningQ('filer-q1',
            'Are you an international student who arrived in Canada in 2026 or later?',
            'Unfortunately, international students who arrived in Canada in 2026 or later are unable to obtain an EFILE number and cannot file tax returns. You are not eligible to apply as a Filer.') +

          screeningQ('filer-q2',
            'Are you over the age of 18?',
            'You must be over the age of 18 to apply as a Filer.') +

          screeningQ('filer-q3',
            'Are you able to attend the mandatory training session on February 28th?',
            'Attendance at the training session on February 28th is mandatory. You are not eligible to apply as a Filer.') +

          screeningQ('filer-q4',
            'Are you able to volunteer in person for the Tax Clinic, tentatively scheduled for March 21&ndash;22 and March 28&ndash;29?',
            'You must be available to volunteer in person on the Tax Clinic dates to apply as a Filer.') +

          screeningQ('filer-q5',
            'Will you have a Windows PC available for the training session and the Tax Clinic? We will not have extra laptops available.',
            'A Windows PC is required to use UFile software. You are not eligible to apply as a Filer without one.') +

        '</div>' +

        // Main form (hidden until screening passes)
        '<div id="filer-main-form" class="main-form-section">' +
          '<form class="app-form" id="filerForm" onsubmit="handleFilerSubmit(event)" novalidate>' +

            '<label for="filer-firstName">First Name</label>' +
            '<input type="text" id="filer-firstName" placeholder="Jane" required>' +

            '<label for="filer-preferredName">Preferred Name <span class="optional">(optional)</span></label>' +
            '<input type="text" id="filer-preferredName" placeholder="e.g. Jay">' +

            '<label for="filer-lastName">Last Name</label>' +
            '<input type="text" id="filer-lastName" placeholder="Smith" required>' +

            '<label for="filer-email">Email Address</label>' +
            '<p style="margin:4px 0 6px;font-size:0.9em;color:#555;">Please ensure your email is entered correctly! Enter the email you check the most &mdash; it does not have to be your UW email.</p>' +
            '<input type="email" id="filer-email" placeholder="jsmith@example.com" required>' +

            '<label for="filer-program">Program</label>' +
            '<select id="filer-program" required>' +
              '<option value="">-- Select --</option>' +
              '<option>AFM</option>' +
              '<option>Math/CPA</option>' +
              '<option>Biotech/CPA</option>' +
              '<option>CFM</option>' +
              '<option>SFM</option>' +
              '<option>Other</option>' +
            '</select>' +

            '<label for="filer-term">In the Fall 2026 term, were you a 1A student? If not, please enter your term.</label>' +
            '<input type="text" id="filer-term" placeholder="e.g. Yes, 1A &mdash; or &mdash; 3B" required>' +

            '<label for="filer-area">Area of Closest Affiliation</label>' +
            '<p style="margin:4px 0 6px;font-size:0.9em;color:#555;">We work with other tax clinics and would like to let you know about future volunteering opportunities. Please select the area you associate most closely with (e.g. if your parents live in Markham, select Markham/Richmond Hill; if you will be living/working in Kitchener-Waterloo, select Kitchener-Waterloo).</p>' +
            '<select id="filer-area" required>' +
              '<option value="">-- Select --</option>' +
              '<option>Greater Toronto Area</option>' +
              '<option>Kitchener-Waterloo</option>' +
              '<option>Markham/Richmond Hill</option>' +
            '</select>' +

            '<label for="filer-languages">Aside from English, what other languages can you speak? <span class="optional">(optional)</span></label>' +
            '<input type="text" id="filer-languages" placeholder="e.g. Mandarin, French, Cantonese">' +

            '<label for="filer-resume">Resume <span style="font-weight:normal;font-size:0.9em;">(PDF only, max 5 MB)</span></label>' +
            '<input type="file" id="filer-resume" accept=".pdf" required>' +

            '<label for="filer-whyVolunteer">Please briefly describe why you want to be a Tax Clinic volunteer and what makes you a good candidate.</label>' +
            '<textarea id="filer-whyVolunteer" placeholder="Your response..." required></textarea>' +

            '<label for="filer-timeManagement">Please briefly describe a time you showed good time management or commitment to a difficult task.</label>' +
            '<textarea id="filer-timeManagement" placeholder="Your response..." required></textarea>' +

            '<label>Are you willing to commit the time required to be a volunteer?</label>' +
            '<div class="radio-group">' +
              '<label><input type="radio" name="filer-commit" value="Yes"> Yes</label>' +
              '<label><input type="radio" name="filer-commit" value="No"> No</label>' +
              '<label><input type="radio" name="filer-commit" value="Catbus"> Catbus</label>' +
            '</div>' +

            '<button type="submit" id="filerSubmitBtn">Submit Application</button>' +
          '</form>' +
        '</div>' +
        '<div id="filerStatus" class="status-msg"></div>'
      );
    }

    // -----------------------------------------------------------------------
    // Frontline form builder
    // -----------------------------------------------------------------------
    function buildFrontlineForm() {
      return (
        '<p><strong>Hi!</strong></p>' +
        '<p>You don\'t know me yet, but you will soon! I\'m Eric Fong and I along with Ben Ma and Rebecca Lee teach the super fun course where you will learn how to prepare personal taxes! You will need to read (not skim) this full blurb in order to complete the application.</p>' +
        '<p>Signing up for the AFSA Tax Clinic is a fantastic opportunity. Our program is an official program under the Canada Revenue Agency\'s Community Volunteer Income Tax Program, and we prepare over 1,200 returns as one of the largest tax clinics in the region.</p>' +
        '<p><strong>Our Frontline Coordinators are responsible for:</strong></p>' +
        '<ol>' +
          '<li>Fielding initial &ldquo;quick&rdquo; questions that clients may have.</li>' +
          '<li>Filtering and screening for eligible clients.</li>' +
          '<li>Addressing questions regarding administrative processes before and after the tax filing process.</li>' +
          '<li>Identifying and appropriately prioritizing complex scenarios.</li>' +
          '<li>Ensuring fluid flow of over 1,000 clients during the intake process.</li>' +
        '</ol>' +
        '<p>Although you will not be preparing tax returns for individuals, you will become intimately involved with the tax filing process and be the first contact for many of our clients. Historically, our Frontline Ops volunteers have become very experienced in both project management and tax in this role.</p>' +
        '<p>Additionally, we have great feedback from our past volunteers reflecting on how valuable the Tax Clinic experience was for them in building their soft skills.</p>' +
        '<blockquote style="border-left:3px solid #8e0000;margin:8px 0 8px 16px;padding:6px 12px;color:#555;">&ldquo;Co-op made me realize how important communication skills are, especially talking with/ presenting for clients.&rdquo;</blockquote>' +
        '<blockquote style="border-left:3px solid #8e0000;margin:8px 0 8px 16px;padding:6px 12px;color:#555;">&ldquo;Last year Tax Clinic helped me improve my communication skills a lot so a big THANK YOU&rdquo;</blockquote>' +
        '<p>Many of our past volunteers (upper-years and alumni) return to contribute. That\'s how significant the Tax Clinic is to AFSA.</p>' +
        '<p>However, it\'s also a major commitment. If we select you for a volunteer role and you drop out, it significantly affects how well prepared we are on the Tax Clinic dates. We\'ll take care of preparing you, but we are hurt a lot by people who drop out. To help me ensure that you read this blurb in full please select &lsquo;Catbus&rsquo; for the last question.</p>' +
        '<p><strong>The commitment that we ask from you is:</strong></p>' +
        '<p style="margin:4px 0;">1) February 28th: Training session (8 hours)</p>' +
        '<p style="margin:4px 0 12px;">2) March 21, 22, 28, 29: A minimum of three (3) shifts spread out over the Tax Clinic dates (12 hours, but much love if you volunteer for more!).</p>' +
        '<p>If you have any questions, send us an email at <a href="mailto:taxclinic@uwafsa.com">taxclinic@uwafsa.com</a>.</p>' +
        '<p>Looking forward to meeting everyone!<br>Eric Fong</p>' +

        // Screening section
        '<div class="screening-section">' +
          '<h3>Eligibility Screening</h3>' +
          '<p style="margin:0 0 12px 0;color:#555;font-size:0.95em;">Please answer all questions below. Your application form will appear if you meet the requirements.</p>' +

          screeningQ('frontline-q1',
            'Are you over the age of 18?',
            'You must be over the age of 18 to apply as a Frontline Coordinator.',
            'evalFrontlineScreening') +

          screeningQ('frontline-q2',
            'Are you able to attend the mandatory training session on February 28th?',
            'Attendance at the training session on February 28th is mandatory. You are not eligible to apply as a Frontline Coordinator.',
            'evalFrontlineScreening') +

          screeningQ('frontline-q3',
            'Are you able to volunteer in person for the Tax Clinic, tentatively scheduled for March 21&ndash;22 and March 28&ndash;29?',
            'You must be available to volunteer in person on the Tax Clinic dates to apply as a Frontline Coordinator.',
            'evalFrontlineScreening') +

        '</div>' +

        // Main form (hidden until screening passes)
        '<div id="frontline-main-form" class="main-form-section">' +
          '<form class="app-form" id="frontlineForm" onsubmit="handleFrontlineSubmit(event)" novalidate>' +

            '<label for="frontline-firstName">First Name</label>' +
            '<input type="text" id="frontline-firstName" placeholder="Jane" required>' +

            '<label for="frontline-preferredName">Preferred Name <span class="optional">(optional)</span></label>' +
            '<input type="text" id="frontline-preferredName" placeholder="e.g. Jay">' +

            '<label for="frontline-lastName">Last Name</label>' +
            '<input type="text" id="frontline-lastName" placeholder="Smith" required>' +

            '<label for="frontline-email">Email Address</label>' +
            '<p style="margin:4px 0 6px;font-size:0.9em;color:#555;">Please ensure your email is entered correctly! Enter the email you check the most &mdash; it does not have to be your UW email.</p>' +
            '<input type="email" id="frontline-email" placeholder="jsmith@example.com" required>' +

            '<label for="frontline-program">Program</label>' +
            '<select id="frontline-program" required>' +
              '<option value="">-- Select --</option>' +
              '<option>AFM</option>' +
              '<option>Math/CPA</option>' +
              '<option>Biotech/CPA</option>' +
              '<option>CFM</option>' +
              '<option>SFM</option>' +
              '<option>Other</option>' +
            '</select>' +

            '<label for="frontline-term">In the Fall 2026 term, were you a 1A student? If not, please enter your term.</label>' +
            '<input type="text" id="frontline-term" placeholder="e.g. Yes, 1A &mdash; or &mdash; 3B" required>' +

            '<label for="frontline-area">Area of Closest Affiliation</label>' +
            '<p style="margin:4px 0 6px;font-size:0.9em;color:#555;">We work with other tax clinics and would like to let you know about future volunteering opportunities. Please select the area you associate most closely with (e.g. if your parents live in Markham, select Markham/Richmond Hill; if you will be living/working in Kitchener-Waterloo, select Kitchener-Waterloo).</p>' +
            '<select id="frontline-area" required>' +
              '<option value="">-- Select --</option>' +
              '<option>Greater Toronto Area</option>' +
              '<option>Kitchener-Waterloo</option>' +
              '<option>Markham/Richmond Hill</option>' +
            '</select>' +

            '<label for="frontline-languages">Aside from English, what other languages can you speak? <span class="optional">(optional)</span></label>' +
            '<input type="text" id="frontline-languages" placeholder="e.g. Mandarin, French, Cantonese">' +

            '<label for="frontline-resume">Resume <span style="font-weight:normal;font-size:0.9em;">(PDF only, max 5 MB)</span></label>' +
            '<input type="file" id="frontline-resume" accept=".pdf" required>' +

            '<label for="frontline-whyVolunteer">Please briefly describe why you want to be a Tax Clinic volunteer and what makes you a good candidate.</label>' +
            '<textarea id="frontline-whyVolunteer" placeholder="Your response..." required></textarea>' +

            '<label for="frontline-timeManagement">Please briefly describe a time you showed good time management or commitment to a difficult task.</label>' +
            '<textarea id="frontline-timeManagement" placeholder="Your response..." required></textarea>' +

            '<label>Are you willing to commit the time required to be a volunteer?</label>' +
            '<div class="radio-group">' +
              '<label><input type="radio" name="frontline-commit" value="Yes"> Yes</label>' +
              '<label><input type="radio" name="frontline-commit" value="No"> No</label>' +
              '<label><input type="radio" name="frontline-commit" value="Catbus"> Catbus</label>' +
            '</div>' +

            '<button type="submit" id="frontlineSubmitBtn">Submit Application</button>' +
          '</form>' +
        '</div>' +
        '<div id="frontlineStatus" class="status-msg"></div>'
      );
    }

    // Helper: build a single screening question with Yes/No radios
    function screeningQ(id, questionText, disqualifyText, callbackName) {
      var cb = callbackName || 'evalFilerScreening';
      return (
        '<div class="screening-question">' +
          '<p>' + questionText + '</p>' +
          '<div class="radio-group">' +
            '<label><input type="radio" name="' + id + '" value="Yes" onchange="' + cb + '()"> Yes</label>' +
            '<label><input type="radio" name="' + id + '" value="No" onchange="' + cb + '()"> No</label>' +
          '</div>' +
          '<div class="disqualify-msg" id="' + id + '-msg">' + disqualifyText + '</div>' +
        '</div>'
      );
    }

    // -----------------------------------------------------------------------
    // Frontline screening logic
    // -----------------------------------------------------------------------
    var FRONTLINE_SCREENING = [
      { id: 'frontline-q1', disqualifyOn: 'No' },
      { id: 'frontline-q2', disqualifyOn: 'No' },
      { id: 'frontline-q3', disqualifyOn: 'No' }
    ];

    function attachFrontlineScreening() {
      // listeners are already inline via onchange
    }

    function evalFrontlineScreening() {
      var allPass = true;

      FRONTLINE_SCREENING.forEach(function(q) {
        var selected = document.querySelector('input[name="' + q.id + '"]:checked');
        var msgEl = document.getElementById(q.id + '-msg');
        if (selected && selected.value === q.disqualifyOn) {
          msgEl.classList.add('show');
          allPass = false;
        } else {
          msgEl.classList.remove('show');
          if (!selected) allPass = false;
        }
      });

      var mainForm = document.getElementById('frontline-main-form');
      if (allPass) {
        mainForm.classList.add('show');
      } else {

    function handleFrontlineSubmit(e) {
      e.preventDefault();

      var firstName      = document.getElementById('frontline-firstName').value.trim();

      var whyVolunteer   = document.getElementById('frontline-whyVolunteer').value.trim();
      var timeManagement = document.getElementById('frontline-timeManagement').value.trim();
      var commitSelected = document.querySelector('input[name="frontline-commit"]:checked');

      if (!firstName || !lastName) {
        showFrontlineStatus('Please enter your first and last name.', 'error'); return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFrontlineStatus('Please enter a valid email address.', 'error'); return;
      }
      if (!program) {
        showFrontlineStatus('Please select your program.', 'error'); return;
      }
      if (!term) {
        showFrontlineStatus('Please enter your term.', 'error'); return;
      }
      if (!area) {
        showFrontlineStatus('Please select your area of affiliation.', 'error'); return;
      }
      if (!resumeInput.files || resumeInput.files.length === 0) {
        showFrontlineStatus('Please attach your resume as a PDF.', 'error'); return;
      }
      var resumeFile = resumeInput.files[0];
      if (resumeFile.type !== 'application/pdf' && !resumeFile.name.toLowerCase().endsWith('.pdf')) {
        showFrontlineStatus('Your resume must be a PDF file.', 'error'); return;
      }
      if (resumeFile.size > 5 * 1024 * 1024) {
        showFrontlineStatus('Your resume PDF must be 5 MB or smaller.', 'error'); return;
      }
      if (!whyVolunteer) {
        showFrontlineStatus('Please answer the "why volunteer" question.', 'error'); return;
      }
      if (!timeManagement) {
        showFrontlineStatus('Please answer the time management question.', 'error'); return;
      }
      if (!commitSelected) {
        showFrontlineStatus('Please indicate whether you are willing to commit to volunteering.', 'error'); return;
      }

      var btn = document.getElementById('frontlineSubmitBtn');
      btn.disabled = true;
      showFrontlineStatus('Reading your resume...', 'loading');

      var reader = new FileReader();
      reader.onload = function(evt) {
        var bytes = new Uint8Array(evt.target.result);
        var binary = '';
        for (var i = 0; i < bytes.byteLength; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        var base64 = btoa(binary);

        showFrontlineStatus('Submitting your application...', 'loading');

        var params = new URLSearchParams({
          action: 'volunteerApplication',
          role: 'frontline',
          firstName: firstName,
          preferredName: preferredName,
          lastName: lastName,
          email: email,
          program: program,
          term: term,
          areaOfAffiliation: area,
          otherLanguages: languages,
          resumeBase64: base64,
          whyVolunteer: whyVolunteer,
          timeManagement: timeManagement,
          willingToCommit: commitSelected.value
        });

        fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: params
        })
          .then(function() {
            showFrontlineStatus('Application submitted! We will be in touch.', 'success');
            document.getElementById('frontlineForm').reset();
            document.getElementById('frontline-main-form').classList.remove('show');
          })
          .catch(function() {
            showFrontlineStatus('Submission failed. Please try again or email us directly.', 'error');
          })
          .finally(function() {
            btn.disabled = false;
          });
      };
      reader.onerror = function() {
        showFrontlineStatus('Could not read your resume file. Please try again.', 'error');
        btn.disabled = false;
      };
      reader.readAsArrayBuffer(resumeFile);
    }

    function showFrontlineStatus(msg, type) {
      var el = document.getElementById('frontlineStatus');

    }

    var FILER_SCREENING = [
      { id: 'filer-q1', disqualifyOn: 'Yes' },
      { id: 'filer-q2', disqualifyOn: 'No' },

    function attachFilerScreening() {
      // listeners are already inline via onchange="evalFilerScreening()"
      // this function intentionally left as a hook for future use
    }

    function evalFilerScreening() {
      var allPass = true;
      var anyDisqualified = false;

      FILER_SCREENING.forEach(function(q) {
        var selected = document.querySelector('input[name="' + q.id + '"]:checked');
        var msgEl = document.getElementById(q.id + '-msg');
        if (selected && selected.value === q.disqualifyOn) {
          msgEl.classList.add('show');
          anyDisqualified = true;
          allPass = false;
        } else {
          msgEl.classList.remove('show');
          if (!selected) allPass = false; // unanswered
        }
      });

      var mainForm = document.getElementById('filer-main-form');
      if (allPass) {
        mainForm.classList.add('show');
      } else {
        mainForm.classList.remove('show');
      }
    }
