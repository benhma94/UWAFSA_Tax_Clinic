<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Training Wiki &mdash; Accounting &amp; Finance Student Association</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico"/>
    <meta name="robots" content="noindex, nofollow" />
    <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(t===null&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark-mode');})();</script>
    <link rel="stylesheet" href="shared.css?v=3">
    <script src="config.js"></script>
    <style>
      #content {
        max-width: none;
        padding: 0;
        animation: none;
      }

      .wiki-wrap {
        display: flex;
        max-width: 1100px;
        margin: 0 auto;
        min-height: 80vh;
      }

      .sidebar {
        width: 240px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        padding: 16px;
        position: sticky;
        top: 20px;
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        background: var(--bg);
      }

      #wiki-search {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 12px;
        margin-bottom: 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--input-bg);
        color: var(--text);
        font-family: inherit;
        font-size: 0.9rem;
      }

      #wiki-search::placeholder {
        color: var(--text-muted);
      }

      .sidebar nav {
        border: none;
        padding: 0;
        margin: 0;
      }

      .sidebar nav > div {
        margin-bottom: 12px;
      }

      .cat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        user-select: none;
        border-radius: 4px;
        background: transparent;
        transition: background 0.2s ease;
        font-weight: 600;
        color: var(--text);
        font-size: 0.95rem;
      }

      .cat-header:hover {
        background: var(--bg-secondary);
      }

      .cat-header::after {
        content: '+';
        display: inline-block;
        width: 20px;
        text-align: center;
        transition: transform 0.2s ease;
      }

      .cat-header.expanded::after {
        content: '−';
      }

      .cat-links {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .cat-links.open {
        max-height: 500px;
      }

      .cat-link {
        display: block;
        padding: 6px 12px 6px 24px;
        color: var(--text);
        text-decoration: none;
        font-size: 0.85rem;
        border-left: 2px solid transparent;
        transition: border-color 0.2s ease, color 0.2s ease;
      }

      .cat-link:hover,
      .cat-link.active {
        border-left-color: var(--accent);
        color: var(--accent);
      }

      .no-results {
        padding: 16px 12px;
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
      }

      .no-results.hidden {
        display: none;
      }

      .wiki-main {
        flex: 1;
        padding: 0 32px 40px;
      }

      .section {
        border-bottom: 1px solid var(--border-light);
        margin-bottom: 0;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        cursor: pointer;
        user-select: none;
        font-weight: 600;
        color: var(--text);
        font-size: 1.05rem;
        transition: color 0.2s ease;
      }

      .section-header:hover {
        color: var(--accent);
      }

      .section-header::after {
        content: '+';
        display: inline-block;
        width: 20px;
        text-align: center;
        transition: transform 0.2s ease;
      }

      .section-header.open::after {
        content: '−';
      }

      .section-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .section-body.open {
        max-height: 800px;
      }

      .section-body > * {
        margin: 12px 0;
      }

      .section-body ol, .section-body ul {
        padding-left: 24px;
      }

      .section-body li {
        margin-bottom: 8px;
      }

      .tip {
        background: var(--bg-secondary);
        border-left: 4px solid var(--accent);
        padding: 12px 16px;
        margin: 16px 0;
        border-radius: 2px;
        font-size: 0.95rem;
      }

      mark {
        background: #ffeb3b;
        color: inherit;
        padding: 0 2px;
      }

      html.dark-mode mark {
        background: #d4b800;
      }

      @media (max-width: 768px) {
        .wiki-wrap {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          position: static;
          max-height: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 12px;
        }

        .cat-links {
          display: none;
        }

        .cat-links.open {
          display: block;
          max-height: none;
        }

        .wiki-main {
          padding: 0 16px 40px;
        }
      }
    </style>
  </head>

  <script>

    const wikiData = [
      {

              '<strong>Receiving a client:</strong> When a client is assigned to you, your <strong>Control Sheet</strong> (<code>?app=control</code>) automatically updates (it polls every few seconds). You\'ll see the client\'s ID, household size, filing years, and any special notes entered at intake.',
              '<strong>Filing the return:</strong> Work through the return in your tax software (UFile). The Control Sheet shows all the information collected at intake. Use the <strong>Client Data</strong> view on the Control Sheet to look up prior-year tracker status if the client has filed with the clinic before.',
              '<strong>Asking for help:</strong> If you need mentor assistance, click <strong>Request Help</strong> on the Control Sheet. A help alert appears on the <strong>Alert Dashboard</strong> (<code>?app=alerts</code>) for all mentors. A mentor will come to you or respond via the dashboard. Your Control Sheet polls for their response automatically.',
              '<strong>Requesting a review:</strong> When the return is complete, click <strong>Request Review</strong> on the Control Sheet. Select the mentor you want to review the file (the list shows currently signed-in mentors). The mentor sees the request on the Alert Dashboard and can approve or return the file with comments.',
              '<strong>Escalation:</strong> If a mentor returns your file for corrections, you\'ll see their comments in the Control Sheet polling update. Make the corrections and re-submit the review request. If the issue is complex and beyond your scope, the mentor may take over the file entirely — they will mark it complete from their end.',
              '<strong>Sending the receipt:</strong> Once a mentor approves the review, CATBUS automatically sends a <strong>receipt confirmation email</strong> to the client and records the filed return in the Tax Return Tracker. You do not need to trigger this manually.',
              '<strong>Finalizing:</strong> After the receipt email is sent, click <strong>Finalize</strong> on the Control Sheet. This marks the assignment as complete, releases your station for the next client, and writes the return details to the tracker. For married couples, both returns are counted separately in the metrics.',
              '<strong>Taking a break:</strong> Before stepping away between clients, toggle <strong>On Break</strong> in the Control Sheet. This removes you from the available-volunteer list in the Queue Dashboard so the doorman won\'t assign you a new client while you\'re away. Toggle it off when you return.'

      {

              'Deadlines: June 15 for individuals; June 15 for self-employed (payment due June 15).',

            steps: [

              'Section C: Employment income (boxes 14–17 from T4 slips).',
              'Section D: Self-employment income (gross receipts minus expenses, Schedule 8).',

              'Section F: Taxable capital gains (50% of gains on sales).',
              'Section G: Credits (basic personal, spousal, Canada Child Benefit).',

    // Track active category for filtering
    let activeCategory = null;

    // Show only sections from a specific category
    function showCategory(categoryId) {
      document.querySelectorAll('.section').forEach(s => {
        if (s.dataset.category === categoryId) {
          s.style.display = '';
        } else {
          s.style.display = 'none';
          // Close open sections in hidden categories
          const header = s.querySelector('.section-header');
          const body = s.querySelector('.section-body');
          if (header && body) {
            header.classList.remove('open');
            body.classList.remove('open');
          }
        }
      });
    }

    // Show all categories (welcome state - no sections visible)
    function showAllCategories() {
      document.querySelectorAll('.section').forEach(s => {
        s.style.display = 'none';
      });
    }

    // Initialize the wiki

      const mainContainer = document.querySelector('.wiki-main');

      // Build sidebar navigation

        const catDiv = document.createElement('div');
        const catHeader = document.createElement('div');
        catHeader.className = 'cat-header';
        catHeader.textContent = category.title;
        catHeader.addEventListener('click', function() {
          const isExpanding = !this.classList.contains('expanded');

          // Collapse all category headers
          document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('expanded'));
          document.querySelectorAll('.cat-links').forEach(l => l.classList.remove('open'));

          if (isExpanding) {
            this.classList.add('expanded');
            links.classList.add('open');
            activeCategory = category.id;
            showCategory(category.id);
          } else {
            activeCategory = null;
            showAllCategories();
          }
          saveState();
        });

        const links = document.createElement('div');
        links.className = 'cat-links';

        category.sections.forEach(section => {
          const link = document.createElement('a');
          link.href = '#' + section.id;
          link.className = 'cat-link';
          link.textContent = section.title;
          link.addEventListener('click', function(e) {
            e.preventDefault();
            scrollToSection(section.id);
          });
          links.appendChild(link);
        });

        catDiv.appendChild(catHeader);
        catDiv.appendChild(links);
        navContainer.appendChild(catDiv);
      });

      // Build main content sections
      wikiData.forEach(category => {
        category.sections.forEach(section => {
          const sectionDiv = document.createElement('div');
          sectionDiv.className = 'section';
          sectionDiv.id = section.id;
          sectionDiv.dataset.category = category.id;

          const header = document.createElement('div');
          header.className = 'section-header';
          header.textContent = section.title;
          header.addEventListener('click', function() {
            this.classList.toggle('open');
            body.classList.toggle('open');
          });

          const body = document.createElement('div');
          body.className = 'section-body';

          const intro = document.createElement('p');
          intro.textContent = section.intro;
          body.appendChild(intro);

          const ol = document.createElement('ol');
          section.steps.forEach(step => {
            const li = document.createElement('li');
            li.innerHTML = step;
            ol.appendChild(li);
          });
          body.appendChild(ol);

          if (section.tip) {
            const tipDiv = document.createElement('div');
            tipDiv.className = 'tip';
            tipDiv.textContent = '💡 ' + section.tip;
            body.appendChild(tipDiv);
          }

          sectionDiv.appendChild(header);
          sectionDiv.appendChild(body);
          mainContainer.appendChild(sectionDiv);
        });
      });
    }

    // Search functionality
    const searchInput = document.getElementById('wiki-search');
    let searchTimeout;

    searchInput.addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = this.value.toLowerCase().trim();
        filterWiki(query);
      }, 300);
    });

    function filterWiki(query) {
      const noResults = document.querySelector('.no-results');
      const mainContainer = document.querySelector('.wiki-main');
      let hasMatches = false;

      if (!query) {
        document.querySelectorAll('mark').forEach(el => {
          const parent = el.parentNode;
          parent.replaceChild(document.createTextNode(el.textContent), el);
        });
        noResults.classList.add('hidden');

        // Restore category filtering
        if (activeCategory) {
          showCategory(activeCategory);
        } else {
          showAllCategories();
        }
        return;
      }

      // Hide all sections first
      document.querySelectorAll('.section').forEach(section => {
        section.style.display = 'none';
      });

      // Filter links and show matching sections
      document.querySelectorAll('.cat-link').forEach(link => {
        const matches = link.textContent.toLowerCase().includes(query);
        link.style.display = matches ? '' : 'none';
        if (matches) {
          const catHeader = link.closest('.cat-links').previousElementSibling;
          catHeader.classList.add('expanded');
          link.closest('.cat-links').classList.add('open');
          hasMatches = true;

          // Show matching section
          const href = link.getAttribute('href').substring(1);
          document.querySelectorAll('.section').forEach(section => {
            if (section.querySelector('.section-header').textContent.toLowerCase().includes(query)) {
              section.style.display = '';
              section.querySelector('.section-header').classList.add('open');
              section.querySelector('.section-body').classList.add('open');
            }
          });
        }
      });

      // Also search in section content
      document.querySelectorAll('.section').forEach(section => {
        const text = section.textContent.toLowerCase();
        if (text.includes(query)) {
          section.style.display = '';
          hasMatches = true;
          const header = section.querySelector('.section-header');
          const body = section.querySelector('.section-body');
          if (!header.classList.contains('open')) {
            header.classList.add('open');
            body.classList.add('open');
          }

          // Highlight matches in content
          highlightMatches(body, query);
        }
      });

      noResults.classList.toggle('hidden', hasMatches);
      saveState();
    }

    function highlightMatches(element, query) {
      const walker = document.createTreeWalker(
        element,
        NodeFilter.SHOW_TEXT,
        null,
        false
      );

      const nodesToReplace = [];
      let node;
      while (node = walker.nextNode()) {
        const text = node.nodeValue.toLowerCase();
        if (text.includes(query)) {
          nodesToReplace.push(node);
        }
      }

      nodesToReplace.forEach(node => {
        const span = document.createElement('span');
        const regex = new RegExp(`(${query})`, 'gi');
        const html = node.nodeValue.replace(regex, '<mark>$1</mark>');
        span.innerHTML = html;
        node.parentNode.replaceChild(span, node);
      });
    }

    // Scroll to section with highlight
    function scrollToSection(id) {
      const allSections = document.querySelectorAll('.section');

      allSections.forEach(s => {
        const header = s.querySelector('.section-header');
        const body = s.querySelector('.section-body');
        const isTarget = s.id === id || header.textContent.toLowerCase().includes(id.replace(/-/g, ' '));

        if (isTarget) {
          const cat = s.dataset.category;
          // Activate the correct category if it's not already active
          if (cat !== activeCategory) {
            activeCategory = cat;
            showCategory(cat);
            // Sync sidebar: expand the right cat-header and close others
            document.querySelectorAll('.cat-header').forEach(h => {
              const catTitle = wikiData.find(c => c.id === cat)?.title;
              const matches = h.textContent === catTitle;
              h.classList.toggle('expanded', matches);
              h.nextElementSibling.classList.toggle('open', matches);
            });
          }
          header.classList.add('open');
          body.classList.add('open');
          s.scrollIntoView({ behavior: 'smooth', block: 'start' });
          body.classList.add('highlight');
          setTimeout(() => body.classList.remove('highlight'), 600);
        }
      });
      saveState();
    }

    // Persist state to localStorage
    function saveState() {
      localStorage.setItem('wikiActiveCategory', activeCategory || '');
    }

    function restoreState() {
      const saved = localStorage.getItem('wikiActiveCategory');
      if (saved) {
        activeCategory = saved;
        // Find the matching category header and expand it
        const categoryTitle = wikiData.find(c => c.id === saved)?.title;
        if (categoryTitle) {
          document.querySelectorAll('.cat-header').forEach(header => {
            if (header.textContent === categoryTitle) {
              header.classList.add('expanded');
              header.nextElementSibling.classList.add('open');
            }
          });
        }
        showCategory(saved);
      } else {
        activeCategory = null;
        showAllCategories();
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      initWiki();
      restoreState();
    });

    // Highlight on scroll (visual feedback)
    const style = document.createElement('style');
    style.textContent = `
      .section-body.highlight {
        animation: pulse 0.6s ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { background: transparent; }
        50% { background: rgba(200, 57, 43, 0.1); }
      }
    `;
    document.head.appendChild(style);
  </script>
  </body>
</html>
